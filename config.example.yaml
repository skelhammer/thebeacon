# TheBeacon Configuration
# Copy this to config.yaml and fill in your SuperOps credentials

superops:
  api_url: "https://api.superops.ai/msp"
  # api_url: "https://euapi.superops.ai/msp"    # EU data center
  api_key: "YOUR_SUPEROPS_API_KEY_HERE"
  customer_subdomain: "YOUR_SUBDOMAIN"
  page_size: 100
  cache_ttl_seconds: 60

# URL template for linking to tickets in SuperOps UI
# {ticket_id} will be replaced with the actual ticket display ID
ticket_url_template: "https://helpdesk.yourcompany.com/#/tickets/{ticket_id}/ticket"

# Named views - each filters tickets by tech group IDs
# Use getTechnicianGroupList GraphQL query to find your group IDs
views:
  helpdesk:
    display_name: "Helpdesk"
    icon: "headset"
    tech_group_ids: []                # Empty = show all tickets (unless exclude list is set)
    exclude_tech_group_ids: []        # Group IDs to exclude from this view
  # pro-services:
  #   display_name: "Pro Services"
  #   icon: "wrench"
  #   tech_group_ids:
  #     - "YOUR_GROUP_ID_HERE"
  # tier-2:
  #   display_name: "Tier 2"
  #   icon: "shield-check"
  #   tech_group_ids:
  #     - "YOUR_GROUP_ID_HERE"
  # project:
  #   display_name: "Project"
  #   icon: "folder-kanban"
  #   tech_group_ids:
  #     - "YOUR_GROUP_ID_HERE"

# Agent dropdown configuration
agents:
  auto_fetch: true
  cache_ttl_seconds: 300

# Maps SuperOps ticket statuses to the 4 dashboard sections
# Section priority: s3 (checked first) -> s1 -> s2 -> s4 (catch-all)
# Customize these to match the statuses configured in your SuperOps instance
status_mapping:
  open:
    statuses:
      - "Open"
    include_no_first_response: true
    include_unassigned: true
  customer_replied:
    statuses:
      - "Customer Reply"
  needs_agent:
    statuses:
      - "Pending"
    include_sla_violated: true
  other_active:
    statuses:
      - "In Progress"
      - "On Hold"
      - "Waiting on Customer"
      - "Waiting on Third Party"

# Alert thresholds for total ticket count display
# Each tier triggers at >= the value. Tiers (low to high):
# ghost_town (<30), zen (30-39), calm (40-49), good (50-59),
# normal (60-79, no effects), sweating (80-89), warning/SOS (90-99),
# danger/"This is Fine" (100+)
alert_thresholds:
  ghost_town: 30
  zen: 40
  calm: 50
  good: 60
  sweating: 80
  warning: 90
  danger: 100

# Dashboard settings
dashboard:
  refresh_interval_seconds: 60
  app_name: "The Beacon"
  company_name: ""              # e.g. "Acme" → "The Acme Beacon"
  port: 5050
  timezone: "America/Los_Angeles"

# Auto-dim settings for TV/kiosk mode
# Dims the screen outside business hours to save energy and reduce glare
auto_dim:
  enabled: true
  dim_start: "17:00"         # 5:00 PM — screen dims (HH:MM or just hour)
  wake: "8:00"               # 8:00 AM — screen wakes (HH:MM or just hour)
  dim_weekends: true         # Stay dimmed all day Saturday & Sunday
  brightness_percent: 15     # How bright when dimmed (0 = black, 100 = full)

# Monthly average metrics displayed in the dashboard header
# Avg First Response: all tickets created in last 30 days (open + closed)
# Avg Resolution Time: tickets closed in last 30 days
# Only tickets in the listed tech groups are included
# Business hours (weekdays only) are used for elapsed time calculations
monthly_averages:
  tech_group_ids: []           # Add tech group IDs to filter (empty = all groups)
  business_hours_start: 8      # 8 AM
  business_hours_end: 17       # 5 PM

# Statuses to exclude from all queries (tickets in these statuses are never shown)
closed_statuses:
  - "Resolved"
  - "Closed"
